name: Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package
        run: python -m pip install -e engine/veriframe_core

      - name: Run storage benchmark
        run: python tools/benchmark/benchmark_storage.py --iterations 50
