name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python package
        run: python -m pip install -e engine/veriframe_core

      - name: Test Angular
        run: pnpm --filter @veriframe/ui-angular test

      - name: Test Python
        run: python -m pytest engine/veriframe_core/tests

      - name: Check Tauri Rust
        run: pnpm --filter @veriframe/desktop-tauri check

      - name: Validate schemas
        run: pnpm test
